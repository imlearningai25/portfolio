# ── Service (LoadBalancer) ─────────────────────────────────────────
# Exposes the portfolio deployment to the internet.
# Kubernetes / your cloud provider automatically distributes
# incoming traffic across all healthy pods (load balancing).
#
# On cloud providers (GKE, EKS, AKS):
#   → A cloud load balancer is provisioned automatically.
#   → Run: kubectl get svc -n portfolio
#   → Look for EXTERNAL-IP — that's your public URL.
#
# On local (minikube):
#   → Run: minikube service portfolio-service -n portfolio
#   → Minikube will open the URL in your browser.
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: portfolio
  labels:
    app: portfolio
  annotations:
    # Uncomment for AWS EKS to get a proper NLB:
    # service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: portfolio                     # Routes traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 80                         # External port (what users hit)
      targetPort: 5000                 # Internal container port
  sessionAffinity: None               # Stateless — any pod can serve any request
