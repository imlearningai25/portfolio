# ── Secret Template ────────────────────────────────────────────────
# DO NOT commit real values here. This is a template only.
#
# To create the real secret, run:
#   kubectl create secret generic portfolio-secret \
#     --from-literal=GMAIL_APP_PASSWORD='your_16_char_app_password' \
#     --from-literal=SECRET_KEY='your_random_flask_secret_key' \
#     --namespace=portfolio
#
# Jenkins creates this automatically from stored credentials.
# If deploying manually, use the kubectl command above instead.
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secret
  namespace: portfolio
  labels:
    app: portfolio
type: Opaque
stringData:
  GMAIL_APP_PASSWORD: "REPLACE_WITH_YOUR_APP_PASSWORD"
  SECRET_KEY: "REPLACE_WITH_A_LONG_RANDOM_STRING"
