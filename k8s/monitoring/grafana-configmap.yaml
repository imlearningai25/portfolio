# ── Grafana Provisioning ConfigMaps ─────────────────────────────────────────
# Datasource and dashboard provider auto-loaded on Grafana startup.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: portfolio
        orgId: 1
        folder: Portfolio
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-portfolio
  namespace: monitoring
data:
  portfolio.json: |
    {
      "title": "Portfolio App Metrics",
      "uid": "portfolio-metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Request Rate (req/s)",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "reqps", "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 50 }] } } },
          "targets": [{ "expr": "sum(rate(flask_http_request_total[5m]))", "legendFormat": "req/s" }]
        },
        {
          "id": 2, "type": "stat", "title": "Error Rate (5xx)",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "reqps", "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.01 }] } } },
          "targets": [{ "expr": "sum(rate(flask_http_request_total{status=~\"5..\"}[5m])) or vector(0)", "legendFormat": "errors/s" }]
        },
        {
          "id": 3, "type": "stat", "title": "p99 Latency",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "s", "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 1 }] } } },
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }]
        },
        {
          "id": 4, "type": "stat", "title": "Total Requests",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [{ "expr": "sum(flask_http_request_total)", "legendFormat": "total" }]
        },
        {
          "id": 5, "type": "timeseries", "title": "Request Rate by Status Code",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [{ "expr": "sum(rate(flask_http_request_total[5m])) by (status)", "legendFormat": "HTTP {{status}}" }]
        },
        {
          "id": 6, "type": "timeseries", "title": "Request Latency Percentiles",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "id": 7, "type": "timeseries", "title": "Request Rate by Endpoint",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [{ "expr": "sum(rate(flask_http_request_total[5m])) by (path)", "legendFormat": "{{path}}" }]
        }
      ]
    }
