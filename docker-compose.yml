version: "3.9"

services:

  # ── Portfolio Flask App ──────────────────────────────────────────
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime        # use the lean runtime stage
    container_name: niraj_portfolio
    restart: unless-stopped

    # ── Environment variables ──────────────────────────────────────
    # Option A (recommended): supply via a .env file
    env_file:
      - .env

    # Option B: hard-code for quick testing (remove in production)
    # environment:
    #   GMAIL_USER: nirajbjk@gmail.com
    #   GMAIL_APP_PASSWORD: your_app_password_here
    #   SECRET_KEY: change-me-in-production

    ports:
      - "5000:5000"          # host:container — change left side to use a different host port

    volumes:
      # Optional: mount static files if you want to edit them without rebuilding
      # - ./static:/app/static:ro

      # Logs folder (optional)
      - portfolio_logs:/app/logs

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - portfolio_net

  # ── Nginx Reverse Proxy (optional but recommended for production) ──
  # Uncomment this block to serve the app behind Nginx with proper
  # static file handling and SSL termination support.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: niraj_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./static:/app/static:ro          # serve static files directly
  #     - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL certs (if using Let's Encrypt)
  #   depends_on:
  #     portfolio:
  #       condition: service_healthy
  #   networks:
  #     - portfolio_net

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - portfolio_net
    depends_on:
      portfolio:
        condition: service_healthy

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - portfolio_net
    depends_on:
      - prometheus

networks:
  portfolio_net:
    driver: bridge

volumes:
  portfolio_logs:
  prometheus_data:
  grafana_data:
