<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Niraj Byanjankar — Principal Software Engineer. Data Governance, Cloud, AI/ML, DevOps & Security expert with 17+ years of experience."
        />
        <meta
            name="keywords"
            content="Niraj Byanjankar, Principal Engineer, Data Governance, GCP, Python, Flask, AI/ML, DevSecOps"
        />
        <title>
            {% block title %}Niraj Byanjankar | Principal Software Engineer{%
            endblock %}
        </title>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />

        <!-- Custom CSS -->
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />

        {% block head %}{% endblock %}
    </head>
    <body>
        <!-- ── Navigation ─────────────────────────────────── -->
        <nav id="navbar">
            <div class="nav-container">
                <a href="#home" class="nav-logo">
                    <span class="logo-bracket">&lt;</span>NB<span
                        class="logo-bracket"
                        >/&gt;</span
                    >
                </a>
                <button
                    class="nav-toggle"
                    id="navToggle"
                    aria-label="Toggle menu"
                >
                    <span></span><span></span><span></span>
                </button>
                <ul class="nav-links" id="navLinks">
                    <li><a href="#home" class="nav-link">Home</a></li>
                    <li><a href="#about" class="nav-link">About</a></li>
                    <li><a href="#skills" class="nav-link">Skills</a></li>
                    <li>
                        <a href="#experience" class="nav-link">Experience</a>
                    </li>
                    <li>
                        <a href="#certs" class="nav-link">Certifications</a>
                    </li>
                    <li>
                        <a href="#contact" class="nav-link contact-btn"
                            >Contact</a
                        >
                    </li>
                </ul>
            </div>
        </nav>

        <!-- ── Main Content ───────────────────────────────── -->
        <main>{% block content %}{% endblock %}</main>

        <!-- ── Footer ─────────────────────────────────────── -->
        <footer id="footer">
            <div class="footer-container">
                <div class="footer-left">
                    <span class="logo-bracket">&lt;</span>NB<span
                        class="logo-bracket"
                        >/&gt;</span
                    >
                    <p>Principal Software Engineer</p>
                </div>
                <div class="footer-links">
                    <a href="mailto:nirajbjk@gmail.com" title="Email"
                        ><i class="fas fa-envelope"></i
                    ></a>
                    <a href="tel:2026564725" title="Phone"
                        ><i class="fas fa-phone"></i
                    ></a>
                    <a
                        href="https://linkedin.com"
                        target="_blank"
                        rel="noopener"
                        title="LinkedIn"
                        ><i class="fab fa-linkedin"></i
                    ></a>
                    <a
                        href="https://github.com"
                        target="_blank"
                        rel="noopener"
                        title="GitHub"
                        ><i class="fab fa-github"></i
                    ></a>
                </div>
                <div class="footer-right">
                    <p>
                        &copy; 2026 Niraj Byanjankar. Built with
                        <span style="color: #00d4ff">Flask</span> &amp;
                        <span style="color: #ff6b6b">♥</span>
                    </p>
                </div>
            </div>
        </footer>

        <!-- Back to top -->
        <button id="backToTop" title="Back to top">
            <i class="fas fa-chevron-up"></i>
        </button>

        <!-- Custom JS -->
        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
